<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To-Do List</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    transition: background 0.3s ease;
}

body.dark-mode{
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
}

.container{
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    max-width: 600px;
    width: 100%;
    padding: 40px;
    transition: all 0.3s ease;
}

body.dark-mode .container{
    background: #2d2d44;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
}

.header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

h1{
    color: #667eea;
    font-size: 32px;
    transition: color 0.3s ease;
}

body.dark-mode h1{
    color: #a8dadc;
}

.controls{
    display: flex;
    gap: 10px;
}

.btn-small{
    background: #667eea;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.btn-small:hover{
    background: #764ba2;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.btn-small:active{
    transform: translateY(0);
}

body.dark-mode .btn-small{
    background: #a8dadc;
    color: #1a1a2e;
    box-shadow: 0 4px 15px rgba(168, 218, 220, 0.3);
}

body.dark-mode .btn-small:hover{
    background: #d4f1f4;
    box-shadow: 0 6px 20px rgba(168, 218, 220, 0.5);
}

.input-container{
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
}

#todoInput{
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s ease;
    background: #f9f9f9;
}

body.dark-mode #todoInput{
    background: #3a3a52;
    border-color: #555;
    color: #fff;
}

#todoInput:focus{
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.btn-add{
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
}

.btn-add:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
}

.btn-add:active{
    transform: translateY(0);
}

.stats{
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 25px;
    padding: 15px;
    background: #f5f5f5;
    border-radius: 10px;
    transition: background 0.3s ease;
}

body.dark-mode .stats{
    background: #3a3a52;
}

.stat-item{
    text-align: center;
    padding: 10px;
}

.stat-label{
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    transition: color 0.3s ease;
}

body.dark-mode .stat-label{
    color: #aaa;
}

.stat-value{
    font-size: 24px;
    font-weight: bold;
    color: #667eea;
    transition: color 0.3s ease;
}

body.dark-mode .stat-value{
    color: #a8dadc;
}

.filters{
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-btn{
    padding: 8px 16px;
    border: 2px solid #e0e0e0;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    color: #667eea;
    transition: all 0.3s ease;
}

body.dark-mode .filter-btn{
    background: #3a3a52;
    border-color: #555;
    color: #a8dadc;
}

.filter-btn.active{
    background: #667eea;
    border-color: #667eea;
    color: white;
}

body.dark-mode .filter-btn.active{
    background: #a8dadc;
    border-color: #a8dadc;
    color: #1a1a2e;
}

.todo-list{
    max-height: 500px;
    overflow-y: auto;
    border-radius: 10px;
    border: 2px solid #e0e0e0;
    transition: border-color 0.3s ease;
}

body.dark-mode .todo-list{
    border-color: #555;
}

.todo-item{
    display: flex;
    align-items: center;
    padding: 15px;
    border-bottom: 1px solid #e0e0e0;
    background: white;
    transition: all 0.3s ease;
}

body.dark-mode .todo-item{
    background: #3a3a52;
    border-bottom-color: #555;
}

.todo-item:hover{
    background: #f9f9f9;
}

body.dark-mode .todo-item:hover{
    background: #464663;
}

.todo-item.completed .todo-text{
    text-decoration: line-through;
    color: #999;
}

.checkbox{
    width: 20px;
    height: 20px;
    margin-right: 15px;
    cursor: pointer;
    accent-color: #667eea;
}

.todo-text{
    flex: 1;
    color: #333;
    font-size: 16px;
    word-break: break-word;
    transition: color 0.3s ease;
}

body.dark-mode .todo-text{
    color: #e0e0e0;
}

.todo-priority{
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
    margin-right: 10px;
    color: white;
}

.priority-high{
    background: #ff6b6b;
}

.priority-medium{
    background: #ffa500;
}

.priority-low{
    background: #51cf66;
}

.todo-date{
    font-size: 12px;
    color: #999;
    margin-right: 10px;
    transition: color 0.3s ease;
}

body.dark-mode .todo-date{
    color: #aaa;
}

.btn-delete{
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s ease;
}

.btn-delete:hover{
    background: #ff5252;
    transform: scale(1.05);
}

.btn-edit{
    background: #4ecdc4;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin-right: 8px;
    transition: all 0.3s ease;
}

.btn-edit:hover{
    background: #45b8b8;
    transform: scale(1.05);
}

.empty-state{
    text-align: center;
    padding: 40px 20px;
    color: #999;
}

body.dark-mode .empty-state{
    color: #aaa;
}

.empty-state-icon{
    font-size: 48px;
    margin-bottom: 15px;
}

.empty-state-text{
    font-size: 18px;
}

/* Scrollbar Styling */
.todo-list::-webkit-scrollbar{
    width: 8px;
}

.todo-list::-webkit-scrollbar-track{
    background: #f1f1f1;
    border-radius: 10px;
}

body.dark-mode .todo-list::-webkit-scrollbar-track{
    background: #3a3a52;
}

.todo-list::-webkit-scrollbar-thumb{
    background: #667eea;
    border-radius: 10px;
}

.todo-list::-webkit-scrollbar-thumb:hover{
    background: #764ba2;
}

/* Modal Styles */
.modal{
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.4);
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-content{
    background-color: white;
    margin: 50px auto;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: slideIn 0.3s ease;
}

body.dark-mode .modal-content{
    background: #2d2d44;
}

@keyframes slideIn{
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.modal-header h2{
    color: #667eea;
}

body.dark-mode .modal-header h2{
    color: #a8dadc;
}

.close-btn{
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #999;
    transition: color 0.3s ease;
}

.close-btn:hover{
    color: #667eea;
}

body.dark-mode .close-btn:hover{
    color: #a8dadc;
}

.form-group{
    margin-bottom: 15px;
}

.form-group label{
    display: block;
    margin-bottom: 5px;
    color: #333;
    font-weight: 600;
    transition: color 0.3s ease;
}

body.dark-mode .form-group label{
    color: #e0e0e0;
}

.form-group input,
.form-group select{
    width: 100%;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
    background: #f9f9f9;
}

body.dark-mode .form-group input,
body.dark-mode .form-group select{
    background: #3a3a52;
    border-color: #555;
    color: #fff;
}

.form-group input:focus,
.form-group select:focus{
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.modal-buttons{
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 25px;
}

.btn-modal{
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

.btn-save{
    background: #667eea;
    color: white;
}

.btn-save:hover{
    background: #764ba2;
    transform: translateY(-2px);
}

.btn-cancel{
    background: #e0e0e0;
    color: #333;
}

.btn-cancel:hover{
    background: #d0d0d0;
}

body.dark-mode .btn-cancel{
    background: #555;
    color: #e0e0e0;
}

body.dark-mode .btn-cancel:hover{
    background: #666;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>📝 My To-Do List</h1>
        <div class="controls">
            <button class="btn-small" onclick="toggleDarkMode()">🌙 Dark</button>
            <button class="btn-small" onclick="clearCompleted()">🗑️ Clear</button>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="todoInput" placeholder="What needs to be done today?" onkeypress="if(event.key==='Enter') addTodo()">
        <button class="btn-add" onclick="addTodo()">Add</button>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="completedCount">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Pending</div>
            <div class="stat-value" id="pendingCount">0</div>
        </div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterTodos('all')">All</button>
        <button class="filter-btn" onclick="filterTodos('active')">Active</button>
        <button class="filter-btn" onclick="filterTodos('completed')">Completed</button>
        <button class="filter-btn" onclick="filterTodos('high')">High Priority</button>
    </div>

    <div class="todo-list" id="todoList">
        <div class="empty-state">
            <div class="empty-state-icon">✨</div>
            <div class="empty-state-text">No tasks yet. Add one to get started!</div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Task</h2>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <div class="form-group">
            <label for="editTodoText">Task</label>
            <input type="text" id="editTodoText" placeholder="Enter task">
        </div>
        <div class="form-group">
            <label for="editTodoPriority">Priority</label>
            <select id="editTodoPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
        </div>
        <div class="form-group">
            <label for="editTodoDate">Due Date</label>
            <input type="date" id="editTodoDate">
        </div>
        <div class="modal-buttons">
            <button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-modal btn-save" onclick="saveEdit()">Save</button>
        </div>
    </div>
</div>

<script>
let todos = [];
let currentFilter = 'all';
let editingId = null;

// Load todos from localStorage
function loadTodos(){
    const saved = localStorage.getItem('todos');
    todos = saved ? JSON.parse(saved) : [];
    renderTodos();
    updateStats();
}

// Save todos to localStorage
function saveTodos(){
    localStorage.setItem('todos', JSON.stringify(todos));
}

// Add a new todo
function addTodo(){
    const input = document.getElementById('todoInput');
    const text = input.value.trim();

    if(text === ''){
        alert('Please enter a task!');
        return;
    }

    const todo = {
        id: Date.now(),
        text: text,
        completed: false,
        priority: 'medium',
        date: new Date().toISOString().split('T')[0],
        createdAt: new Date().toLocaleString()
    };

    todos.push(todo);
    saveTodos();
    input.value = '';
    renderTodos();
    updateStats();
}

// Toggle todo completion
function toggleTodo(id){
    const todo = todos.find(t => t.id === id);
    if(todo){
        todo.completed = !todo.completed;
        saveTodos();
        renderTodos();
        updateStats();
    }
}

// Delete a todo
function deleteTodo(id){
    if(confirm('Are you sure you want to delete this task?')){
        todos = todos.filter(t => t.id !== id);
        saveTodos();
        renderTodos();
        updateStats();
    }
}

// Open edit modal
function openEditModal(id){
    const todo = todos.find(t => t.id === id);
    if(todo){
        editingId = id;
        document.getElementById('editTodoText').value = todo.text;
        document.getElementById('editTodoPriority').value = todo.priority;
        document.getElementById('editTodoDate').value = todo.date;
        document.getElementById('editModal').style.display = 'block';
    }
}

// Close edit modal
function closeModal(){
    document.getElementById('editModal').style.display = 'none';
    editingId = null;
}

// Save edited todo
function saveEdit(){
    if(editingId){
        const todo = todos.find(t => t.id === editingId);
        if(todo){
            todo.text = document.getElementById('editTodoText').value.trim();
            todo.priority = document.getElementById('editTodoPriority').value;
            todo.date = document.getElementById('editTodoDate').value;
            saveTodos();
            renderTodos();
            updateStats();
            closeModal();
        }
    }
}

// Filter todos
function filterTodos(filter){
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderTodos();
}

// Get filtered todos
function getFilteredTodos(){
    switch(currentFilter){
        case 'active':
            return todos.filter(t => !t.completed);
        case 'completed':
            return todos.filter(t => t.completed);
        case 'high':
            return todos.filter(t => t.priority === 'high');
        default:
            return todos;
    }
}

// Render todos
function renderTodos(){
    const todoList = document.getElementById('todoList');
    const filtered = getFilteredTodos();

    if(filtered.length === 0){
        todoList.innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">✨</div>
                <div class="empty-state-text">
                    ${currentFilter === 'all' ? 'No tasks yet. Add one to get started!' : 'No tasks in this category.'}
                </div>
            </div>
        `;
        return;
    }

    todoList.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}">
            <input type="checkbox" class="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
            <span class="todo-priority priority-${todo.priority}">${todo.priority.toUpperCase()}</span>
            <span class="todo-text">${escapeHtml(todo.text)}</span>
            <span class="todo-date">${todo.date}</span>
            <button class="btn-edit" onclick="openEditModal(${todo.id})">✏️ Edit</button>
            <button class="btn-delete" onclick="deleteTodo(${todo.id})">🗑️ Delete</button>
        </div>
    `).join('');
}

// Update statistics
function updateStats(){
    const total = todos.length;
    const completed = todos.filter(t => t.completed).length;
    const pending = total - completed;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('pendingCount').textContent = pending;
}

// Clear completed todos
function clearCompleted(){
    if(todos.some(t => t.completed)){
        if(confirm('Delete all completed tasks?')){
            todos = todos.filter(t => !t.completed);
            saveTodos();
            renderTodos();
            updateStats();
        }
    } else {
        alert('No completed tasks to clear!');
    }
}

// Toggle dark mode
function toggleDarkMode(){
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
}

// Escape HTML to prevent XSS
function escapeHtml(text){
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Close modal when clicking outside
window.onclick = function(event){
    const modal = document.getElementById('editModal');
    if(event.target === modal){
        closeModal();
    }
};

// Load dark mode preference
if(localStorage.getItem('darkMode') === 'true'){
    document.body.classList.add('dark-mode');
}

// Initialize
loadTodos();
</script>

</body>
</html>
